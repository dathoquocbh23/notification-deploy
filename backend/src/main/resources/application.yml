spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 4   # Supabase free tier ít kết nối — chặn pool overflow
  jpa:
    hibernate:
      ddl-auto: update   # demo only — production dùng migration
    open-in-view: false

# Kênh email qua Brevo HTTP API (cổng 443) — cloud chặn SMTP outbound nên KHÔNG dùng SMTP
brevo:
  api-key: ${BREVO_API_KEY:}
  sender-email: ${BREVO_SENDER:visualedu.info@gmail.com}
  sender-name: "Vi Demo"

firebase:
  service-account-path: ${FIREBASE_SA_PATH:./service-account.json}

server:
  port: ${PORT:8080}   # Railway/cloud cấp cổng động qua biến PORT; local mặc định 8080
