spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 4   # Supabase free tier ít kết nối — chặn pool overflow
  jpa:
    hibernate:
      ddl-auto: update   # demo only — production dùng migration
    open-in-view: false
  mail:
    # Brevo SMTP relay — cổng 2525 (cổng SMTP thay thế, không bị chặn như 587/465/25)
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# Sender đã verify trong Brevo — BẮT BUỘC, thiếu From thì Brevo đánh Error (không gửi)
app:
  mail:
    from: ${MAIL_FROM}

firebase:
  service-account-path: ${FIREBASE_SA_PATH:./service-account.json}

server:
  port: 8080
